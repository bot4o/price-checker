<!DOCTYPE html>
<html lang="bg">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AKS Price Checker</title>
        <link rel="stylesheet" href="/static/assets/css/style.css">
    </head>
    <body>
        <div class="wrap">
            <header>
                <h1>AKS <span>Price Checker</span></h1>
                <div class="sub">търсене при партньори — паралелно, всички сайтове наведнъж</div>
            </header>

            <div class="searchbar">
                <input type="text" id="q" placeholder="Модел или част — напр. iPhone 13 дисплей" autofocus>
                <div class="seg" role="group" aria-label="Категория">
                    <button id="btnPhone" class="active">Телефони</button>
                    <button id="btnPc">Компютри</button>
                </div>
                <button class="go" id="go">Търси</button>
            </div>

            <div class="status" id="status"></div>
            <div id="results"></div>
            <div class="hint" id="hint">Въведи модел и натисни „Търси“ — резултатите от всички сайтове идват заедно за няколко секунди.</div>
        </div>

        <script src="/static/assets/js/app.js"></script>
    </body>
</html>
